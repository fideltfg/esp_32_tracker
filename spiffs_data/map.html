<!DOCTYPE html>
<html>
<head>
  <title>GPS Map</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #map { height: 100vh; width: 100%; }
    body { margin: 0; }
    #info {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: rgba(255,255,255,0.9);
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="info">Loading GPS...</div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    var marker = null, first = true;

    function update() {
      fetch('/api/gps').then(r => r.json()).then(d => {
        if (!d.valid) return;
        var ll = [d.lat, d.lon];
        if (!marker) {
          marker = L.circleMarker(ll, { radius: 8, color: '#e74c3c', fillOpacity: 0.8 }).addTo(map);
        } else {
          marker.setLatLng(ll);
        }
        if (first) { map.setView(ll, 16); first = false; }
        document.getElementById('info').innerHTML =
          '<b>' + d.lat.toFixed(6) + ', ' + d.lon.toFixed(6) + '</b><br>' +
          'Speed: ' + d.speed.toFixed(1) + ' km/h<br>' +
          'Alt: ' + d.alt.toFixed(0) + ' m<br>' +
          'Sats: ' + d.sats + ' HDOP: ' + d.hdop.toFixed(1);
      }).catch(() => {});
    }

    setInterval(update, 2000);
    update();
  </script>
</body>
</html>
